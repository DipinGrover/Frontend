<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Demo</title>
</head>
<body>
    
    <form>
        <input type="text" placeholder="name" name="firstname" maxlength="20" autofocus>
        <input type="text" placeholder="address" name="address" size="30">
        <input type="number" placeholder="age" name="age" min="18" max="100">
        
        <input type="text" value="India" placeholder="Country">

        <input type="submit" value="Disabled Button" disabled>
        <!-- class can be same of more than 2 elements -->
        <input type="submit" class="this_btn" value="Click Me!">
    </form>

    <!-- ID should be unique  -->
    <button id="new_btn" class="this_btn">New Button</button>

</body>
</html>
